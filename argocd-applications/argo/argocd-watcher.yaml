apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-watcher
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/DanielPortovedo/home_server
    targetRevision: main
    path: argocd-applications/
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd