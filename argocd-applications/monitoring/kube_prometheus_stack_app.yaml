apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  sources:

  - repoURL: 'https://prometheus-community.github.io/helm-charts'
    chart: kube-prometheus-stack
    targetRevision: 82.13.0
    helm:
      valueFiles:
      - $values/argocd-applications/monitoring/kube_prometheus_stack_resources/kube_prometheus_stack_values.yaml
  - repoURL: 'https://github.com/DanielPortovedo/home_server'
    targetRevision: HEAD
    ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true