apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack-resources
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/DanielPortovedo/home_server'
    path: argocd-applications/monitoring/kube_prometheus_stack_resources
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
