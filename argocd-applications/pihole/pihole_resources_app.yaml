apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pihole-resources
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/DanielPortovedo/home_server'
    path: argocd-applications/pihole/pihole_resources
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: pihole
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
