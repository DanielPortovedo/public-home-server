apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich-resources
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/DanielPortovedo/home_server'
    path: argocd-applications/immich/immich_resources
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: immich
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
