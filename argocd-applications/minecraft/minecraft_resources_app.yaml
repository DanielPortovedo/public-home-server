apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minecraft-resources
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/DanielPortovedo/home_server'
    path: argocd-applications/minecraft/minecraft_resources
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: minecraft
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
